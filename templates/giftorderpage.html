<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donkey Doner — Order</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0e0600;
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    color:#fff;
  }

  /* HEADER */
  header {
    background:#1a0800;
    border-bottom:3px solid #ff6600;
    padding:16px 24px;
    display:flex; align-items:center; gap:14px;
  }
  header h1 { color:#ff6600; font-size:1.5rem; font-weight:900; }
  header .sub { color:#888; font-size:0.85rem; margin-top:2px; }
  .pts-badge {
    margin-left:auto; background:#ff6600;
    color:#fff; font-weight:900; font-size:1rem;
    padding:8px 18px; border-radius:20px;
  }

  /* LAYOUT */
  .page { max-width:900px; margin:0 auto; padding:28px 20px; display:grid;
          grid-template-columns:1fr 340px; gap:24px; }
  @media(max-width:680px){ .page{grid-template-columns:1fr;} }

  /* ORDER ITEMS */
  h2 { color:#ff6600; font-size:1.1rem; font-weight:900; margin-bottom:14px;
       display:flex; align-items:center; gap:8px; }
  .order-list { display:flex; flex-direction:column; gap:14px; }
  .order-card {
    background:#1a0800; border:2px solid #2a1000; border-radius:14px;
    padding:18px; display:flex; align-items:center; gap:16px;
    transition:border-color 0.2s;
  }
  .order-card:hover { border-color:#ff6600; }
  .order-card .food-img {
    width:72px; height:72px; border-radius:10px; object-fit:cover;
    border:2px solid #ff6600;
  }
  .order-card .emoji-thumb {
    width:72px; height:72px; border-radius:10px;
    background:#2a1000; display:flex; align-items:center;
    justify-content:center; font-size:2.6rem; border:2px solid #ff6600;
  }
  .order-card .info { flex:1; }
  .order-card .food-name { font-weight:900; font-size:1rem; }
  .order-card .food-desc { color:#888; font-size:0.78rem; margin:2px 0 6px; }
  .order-card .food-pts { color:#ffcc00; font-size:0.85rem; font-weight:700; }
  .qty-ctrl { display:flex; align-items:center; gap:10px; }
  .qty-ctrl button {
    width:30px; height:30px; border-radius:50%;
    background:#ff6600; color:#fff; border:none;
    font-size:1.1rem; cursor:pointer; font-weight:900;
    display:flex; align-items:center; justify-content:center;
  }
  .qty-ctrl button:disabled { background:#333; cursor:not-allowed; }
  .qty-ctrl span { font-weight:900; min-width:20px; text-align:center; }
  .item-total { color:#ffcc00; font-weight:900; font-size:0.9rem; min-width:60px; text-align:right; }

  /* CART SIDEBAR */
  .cart-box {
    background:#1a0800; border:2px solid #ff6600; border-radius:14px;
    padding:20px; position:sticky; top:20px; height:fit-content;
  }
  .cart-line { display:flex; justify-content:space-between; padding:7px 0;
               border-bottom:1px solid #2a1000; font-size:0.88rem; }
  .cart-line:last-of-type { border-bottom:none; }
  .cart-line .label { color:#aaa; }
  .cart-line .val   { color:#fff; font-weight:700; }
  .pts-bar-wrap { margin:12px 0 6px; }
  .pts-bar-label { display:flex; justify-content:space-between; font-size:0.75rem; color:#888; margin-bottom:4px; }
  .pts-bar { height:10px; background:#2a0a00; border-radius:5px; overflow:hidden; }
  .pts-bar-fill { height:100%; background:linear-gradient(90deg,#ff4400,#ffcc00); border-radius:5px; transition:width 0.3s; }
  .cart-total { display:flex; justify-content:space-between; margin:14px 0 6px;
                font-weight:900; font-size:1.1rem; }
  .cart-total .t-pts { color:#ffcc00; }
  .cart-total .t-left { color:#00e87a; font-size:0.85rem; margin-top:2px; }
  .insufficient { color:#ff4444; font-size:0.78rem; margin-bottom:8px; display:none; }
  .btn-place {
    width:100%; padding:14px; background:#ff6600; color:#fff;
    border:none; border-radius:10px; font-size:1.05rem;
    font-family:'Poppins',sans-serif; font-weight:900;
    cursor:pointer; box-shadow:0 4px 0 #aa3300; margin-top:8px;
  }
  .btn-place:hover:not(:disabled) { background:#ff8800; }
  .btn-place:disabled { background:#444; box-shadow:none; cursor:not-allowed; color:#888; }
  .btn-back { width:100%; padding:10px; background:transparent; color:#888;
              border:1px solid #333; border-radius:10px; font-size:0.9rem;
              cursor:pointer; margin-top:8px; font-family:'Poppins',sans-serif; }
  .btn-back:hover { border-color:#ff6600; color:#fff; }

  /* SUCCESS */
  #successScreen {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.95); z-index:99;
    flex-direction:column; align-items:center; justify-content:center; gap:16px;
  }
  #successScreen h2 { color:#ff6600; font-size:2rem; text-align:center; }
  #successScreen p { color:#ffcc00; font-size:1.1rem; text-align:center; }
  .success-items { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .success-item { background:#1a0800; border:2px solid #ff6600; border-radius:12px;
                  padding:14px 20px; text-align:center; }
  .success-item .big-emoji { font-size:2.5rem; display:block; }
  .success-item .si-name { color:#fff; font-size:0.85rem; margin-top:4px; font-weight:700; }
  .success-item .si-qty { color:#ffcc00; font-size:0.75rem; }
  #successScreen button { padding:12px 36px; background:#ff6600; color:#fff;
    border:none; border-radius:10px; font-size:1rem; cursor:pointer;
    font-family:'Poppins',sans-serif; font-weight:900; margin-top:8px; }

  .empty-state { text-align:center; padding:60px 20px; color:#555; }
  .empty-state .big { font-size:3rem; margin-bottom:12px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🫏 Donkey Doner</h1>
    <div class="sub">Spend your earned points on real food!</div>
  </div>
  <div class="pts-badge">🎯 <span id="hdrPts">0</span> pts</div>
</header>

<div class="page">
  <!-- LEFT: Menu -->
  <div>
    <h2>🌯 Menu</h2>
    <div class="order-list" id="menuList"></div>
  </div>

  <!-- RIGHT: Cart -->
  <div class="cart-box">
    <h2 style="margin-bottom:10px">🛒 Your Order</h2>
    <div id="cartLines"></div>
    <div class="pts-bar-wrap">
      <div class="pts-bar-label">
        <span>Points used</span>
        <span id="barLabel">0 / 0</span>
      </div>
      <div class="pts-bar"><div class="pts-bar-fill" id="ptsBarFill" style="width:0%"></div></div>
    </div>
    <div class="cart-total">
      <span>Total</span>
      <div style="text-align:right">
        <div class="t-pts" id="totalPts">0 pts</div>
        <div class="t-left" id="ptsRemain">0 pts left</div>
      </div>
    </div>
    <div class="insufficient" id="insuffMsg">⚠ Not enough points!</div>
    <button class="btn-place" id="placeBtn" onclick="placeOrder()" disabled>Place Order 🌯</button>
    <button class="btn-back" onclick="window.location.href='/game'">↩ Play Again</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="successScreen">
  <h2>🎉 Order Confirmed!</h2>
  <p>Your Donkey Doner order is on its way!</p>
  <div class="success-items" id="successItems"></div>
  <p id="successPtsLeft" style="color:#aaa;font-size:0.9rem"></p>
  <button onclick="window.location.href='/game'">🫏 Play Again</button>
</div>

const MENU_DATA = [
  { id:'cd', name:'Chicken Doner',  emoji:'🌯', pts:200,
    desc:'Juicy grilled chicken with fresh veggies & garlic sauce in a wrap' },
  { id:'bd', name:'Beef Doner',     emoji:'🥙', pts:300,
    desc:'Premium seasoned beef slices with onion, tomato & spicy sauce' },
  { id:'cs', name:'Chicken Sourma', emoji:'🌮', pts:250,
    desc:'Marinated chicken sourma with pickles, herbs & tahini' },
  { id:'bs', name:'Beef Sourma',    emoji:'🫔', pts:400,
    desc:'Slow-roasted beef sourma with sumac onions & signature sauce' },
];

// Load order from game (if came from game)
const savedOrder = JSON.parse(localStorage.getItem('donkeyOrder') || 'null');
const BUDGET = savedOrder ? savedOrder.budget : 1000;

// Cart: id -> qty
const cart = {};

// Pre-fill cart from game if available
if (savedOrder) {
  savedOrder.items.forEach(i => {
    const m = MENU_DATA.find(m => m.name === i.name);
    if (m) cart[m.id] = i.qty;
  });
}

// ── RENDER MENU ──
function renderMenu() {
  const list = document.getElementById('menuList');
  list.innerHTML = '';
  MENU_DATA.forEach(item => {
    const qty = cart[item.id] || 0;
    const div = document.createElement('div');
    div.className = 'order-card';
    div.id = 'card-' + item.id;
    div.innerHTML = `
      <div class="emoji-thumb">${item.emoji}</div>
      <div class="info">
        <div class="food-name">${item.name}</div>
        <div class="food-desc">${item.desc}</div>
        <div class="food-pts">🎯 ${item.pts} pts each</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="qty-ctrl">
          <button onclick="changeQty('${item.id}',-1)" ${qty===0?'disabled':''}>−</button>
          <span id="qty-${item.id}">${qty}</span>
          <button onclick="changeQty('${item.id}',1)">+</button>
        </div>
        <div class="item-total" id="itotal-${item.id}">${qty ? qty*item.pts+' pts' : ''}</div>
      </div>`;
    list.appendChild(div);
  });
  updateCartUI();
}

function changeQty(id, delta) {
  const item = MENU_DATA.find(m => m.id === id);
  const cur = cart[id] || 0;
  const newQty = Math.max(0, cur + delta);
  const spent = calcSpent() - (cur * item.pts) + (newQty * item.pts);
  if (spent > BUDGET) return;
  cart[id] = newQty;
  // Update just this card's qty + total (no full re-render for smoothness)
  document.getElementById('qty-'+id).textContent = newQty;
  document.getElementById('itotal-'+id).textContent = newQty ? newQty*item.pts+' pts' : '';
  document.getElementById('card-'+id).style.borderColor = newQty > 0 ? '#ffcc00' : '#2a1000';
  updateCartUI();
}

function calcSpent() {
  return MENU_DATA.reduce((s,m) => s + (cart[m.id]||0)*m.pts, 0);
}

function updateCartUI() {
  const spent = calcSpent();
  const left  = BUDGET - spent;
  const hasItems = MENU_DATA.some(m => (cart[m.id]||0) > 0);

  document.getElementById('hdrPts').textContent     = BUDGET;
  document.getElementById('totalPts').textContent   = spent + ' pts';
  document.getElementById('ptsRemain').textContent  = left + ' pts left';
  document.getElementById('barLabel').textContent   = spent + ' / ' + BUDGET;
  document.getElementById('ptsBarFill').style.width = (spent/BUDGET*100)+'%';

  // Cart lines
  const cl = document.getElementById('cartLines');
  const lines = MENU_DATA.filter(m=>(cart[m.id]||0)>0);
  if (lines.length === 0) {
    cl.innerHTML = '<div style="color:#555;font-size:0.82rem;padding:8px 0">Your order is empty</div>';
  } else {
    cl.innerHTML = lines.map(m => `
      <div class="cart-line">
        <span class="label">${m.emoji} ${m.name} x${cart[m.id]}</span>
        <span class="val">${cart[m.id]*m.pts} pts</span>
      </div>`).join('');
  }

  const insuffMsg = document.getElementById('insuffMsg');
  insuffMsg.style.display = spent > BUDGET ? 'block' : 'none';

  const placeBtn = document.getElementById('placeBtn');
  placeBtn.disabled = !hasItems || spent > BUDGET;
}

function placeOrder() {
  const items = MENU_DATA.filter(m=>(cart[m.id]||0)>0);
  // Show success screen
  const si = document.getElementById('successItems');
  si.innerHTML = items.map(m=>`
    <div class="success-item">
      <span class="big-emoji">${m.emoji}</span>
      <div class="si-name">${m.name}</div>
      <div class="si-qty">x${cart[m.id]} &nbsp;·&nbsp; ${cart[m.id]*m.pts} pts</div>
    </div>`).join('');
  const left = BUDGET - calcSpent();
  document.getElementById('successPtsLeft').textContent = left > 0 ? `You saved ${left} pts for next time!` : '';
  document.getElementById('successScreen').style.display='flex';
  localStorage.removeItem('donkeyOrder');
}

renderMenu();
</script>
