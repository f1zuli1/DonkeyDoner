<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DonkeyDoner</title>
	<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

	<style>
		:root {
			--green: #008A2D;
			--yellow: #F9D33A;
			--dark: #1a1a1a;
			--light: #FFFFFF;
			--gray: #f0f0f0;
		}

		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: 'Nunito', sans-serif;
			background: var(--light);
			color: var(--dark);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			overflow-x: hidden;
		}

		/* ── NAV ── */
		nav {
			background: var(--dark);
			padding: 14px 30px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			top: 0;
			z-index: 1000;
			border-bottom: 4px solid var(--yellow);
			animation: slideDown 0.6s cubic-bezier(.22,1,.36,1) both;
		}

		@keyframes slideDown {
			from { transform: translateY(-100%); opacity: 0; }
			to   { transform: translateY(0);     opacity: 1; }
		}

		.nav-logo {
			font-family: 'Oswald', sans-serif;
			font-size: 28px;
			font-weight: 700;
			text-transform: uppercase;
			text-decoration: none;
			letter-spacing: 2px;
		}

		.logo-cat   { color: var(--yellow); }
		.logo-doner { color: var(--green); }

		.nav-links { display: flex; gap: 15px; align-items: center; }

		nav a.nav-link {
			color: #ccc;
			text-decoration: none;
			font-size: 13px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1px;
			position: relative;
			transition: color 0.3s;
		}

		nav a.nav-link::after {
			content: '';
			position: absolute;
			bottom: -3px; left: 0;
			width: 0; height: 2px;
			background: var(--yellow);
			transition: width 0.3s ease;
		}

		nav a.nav-link:hover { color: var(--yellow); }
		nav a.nav-link:hover::after { width: 100%; }

		.nav-links a.order-btn {
			background: var(--yellow);
			color: var(--green);
			padding: 9px 20px;
			border-radius: 6px;
			font-family: 'Oswald', sans-serif;
			font-weight: 700;
			font-size: 14px;
			letter-spacing: 1px;
			text-decoration: none;
			transition: background 0.3s, color 0.3s, transform 0.2s, box-shadow 0.2s;
			box-shadow: 0 3px 0 #c9a800;
		}

		.nav-links a.order-btn:hover {
			background: var(--green);
			color: var(--light);
			transform: translateY(-2px);
			box-shadow: 0 5px 0 #005c1e;
		}

		.nav-links a.order-btn:active {
			transform: translateY(1px);
			box-shadow: 0 1px 0 #c9a800;
		}

		/* ── HERO ── */
		.hero {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 60px 20px;
			position: relative;
			overflow: hidden;
		}

		/* Animated background stripes */
		.hero::before {
			content: '';
			position: absolute;
			inset: 0;
			background: repeating-linear-gradient(
				-45deg,
				transparent,
				transparent 40px,
				rgba(249,211,58,0.04) 40px,
				rgba(249,211,58,0.04) 80px
			);
			animation: bgSlide 20s linear infinite;
			pointer-events: none;
		}

		@keyframes bgSlide {
			from { background-position: 0 0; }
			to   { background-position: 113px 113px; }
		}

		.hero-tag {
			font-family: 'Oswald', sans-serif;
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 4px;
			text-transform: uppercase;
			color: var(--green);
			background: rgba(0,138,45,0.08);
			border: 1px solid rgba(0,138,45,0.2);
			padding: 6px 16px;
			border-radius: 100px;
			margin-bottom: 20px;
			animation: fadeUp 0.7s 0.2s ease both;
		}

		h1 {
			font-family: 'Oswald', sans-serif;
			font-size: clamp(3rem, 8vw, 5.5rem);
			font-weight: 700;
			text-transform: uppercase;
			line-height: 1;
			color: var(--dark);
			text-align: center;
			animation: fadeUp 0.7s 0.35s ease both;
			margin-bottom: 8px;
		}

		h1 span { color: var(--green); }

		.hero-sub {
			font-size: 1rem;
			color: #666;
			text-align: center;
			max-width: 400px;
			margin-bottom: 35px;
			animation: fadeUp 0.7s 0.45s ease both;
		}

		@keyframes fadeUp {
			from { transform: translateY(30px); opacity: 0; }
			to   { transform: translateY(0);    opacity: 1; }
		}

		/* Image card */
		.img-card {
			position: relative;
			border-radius: 20px;
			overflow: hidden;
			box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 6px var(--yellow);
			width: 100%;
			max-width: 540px;
			margin-bottom: 40px;
			animation: fadeUp 0.8s 0.55s ease both;
			transition: transform 0.4s ease, box-shadow 0.4s ease;
		}

		.img-card:hover {
			transform: translateY(-6px) rotate(0.5deg);
			box-shadow: 0 30px 80px rgba(0,0,0,0.2), 0 0 0 6px var(--yellow);
		}

		.img-card img {
			display: block;
			width: 100%;
			height: auto;
			max-height: 440px;
			object-fit: cover;
		}

		.img-card .badge {
			position: absolute;
			top: 16px; right: 16px;
			background: var(--yellow);
			color: var(--dark);
			font-family: 'Oswald', sans-serif;
			font-weight: 700;
			font-size: 12px;
			letter-spacing: 1px;
			padding: 6px 14px;
			border-radius: 100px;
			text-transform: uppercase;
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { transform: scale(1); }
			50%       { transform: scale(1.07); }
		}

		/* CTA button */
		.cta-btn {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			background: var(--green);
			color: var(--light);
			padding: 16px 36px;
			font-family: 'Oswald', sans-serif;
			font-size: 1.1rem;
			font-weight: 600;
			letter-spacing: 2px;
			text-transform: uppercase;
			text-decoration: none;
			border-radius: 8px;
			box-shadow: 0 6px 0 #005c1e;
			transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
			animation: fadeUp 0.7s 0.7s ease both;
			position: relative;
			overflow: hidden;
		}

		.cta-btn::after {
			content: '';
			position: absolute;
			inset: 0;
			background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
			transform: translateX(-100%);
			transition: transform 0.5s;
		}

		.cta-btn:hover::after { transform: translateX(100%); }

		.cta-btn:hover {
			background: var(--dark);
			transform: translateY(-3px);
			box-shadow: 0 9px 0 #000;
		}

		.cta-btn:active {
			transform: translateY(2px);
			box-shadow: 0 2px 0 #005c1e;
		}

		.cta-arrow {
			display: inline-block;
			transition: transform 0.3s;
		}

		.cta-btn:hover .cta-arrow { transform: translateX(5px); }

		/* ── FOOTER STRIP ── */
		.footer-strip {
			background: var(--dark);
			color: #555;
			text-align: center;
			font-size: 12px;
			padding: 14px;
			border-top: 3px solid var(--yellow);
			letter-spacing: 1px;
		}
	</style>
</head>

<body>

	<nav>
		<a href="/" class="nav-logo">
			<span class="logo-cat">Donkey</span><span class="logo-doner">DonEr</span>
		</a>
		<div class="nav-links">
			<a href="/" class="nav-link">Home</a>
			<a href="/order" class="order-btn">ORDER NOW</a>
		</div>
	</nav>

	<div class="hero">
		<div class="hero-tag">🌯 Fresh &amp; Hot Every Day</div>
		<h1>Build Your <span>Doner</span></h1>
		<p class="hero-sub">Handcrafted doners &amp; shawarmas — your way, every time.</p>

		<div class="img-card">
			<img src="../static/img/donkeydoner.png" alt="Featured Doner">
			<span class="badge">⭐ Fan Favourite</span>
		</div>

		<a href="/order" class="cta-btn">
			Build Your Doner <span class="cta-arrow">→</span>
		</a>
	</div>

	<div class="footer-strip">© 2025 CATDONER · MADE WITH 🔥</div>

</body>
</html>
