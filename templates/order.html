<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonkeyDoner - Order</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
	--green: #008A2D;
	--yellow: #F9D33A;
	--dark: #1a1a1a;
	--light: #fff;
	--gray: #f4f4f4;
	--shadow: 0 8px 30px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
	font-family: 'Nunito', sans-serif;
	background: var(--gray);
	color: var(--dark);
	min-height: 100vh;
}

/* ── NAV ── */
nav {
	background: var(--dark);
	padding: 14px 30px;
	display: flex;
	justify-content: space-between;
	align-items: center;
	position: sticky;
	top: 0;
	z-index: 1000;
	border-bottom: 4px solid var(--yellow);
	animation: navIn 0.5s ease both;
}

@keyframes navIn {
	from { transform: translateY(-60px); opacity: 0; }
	to   { transform: translateY(0);     opacity: 1; }
}

.nav-logo {
	font-family: 'Oswald', sans-serif;
	font-size: 26px;
	font-weight: 700;
	text-decoration: none;
	letter-spacing: 2px;
}

.logo-cat   { color: var(--yellow); }
.logo-doner { color: var(--green); }

.nav-links { display: flex; gap: 14px; align-items: center; }

nav a.nav-link {
	color: #ccc;
	text-decoration: none;
	font-size: 13px;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 1px;
	transition: color 0.3s;
}

nav a.nav-link:hover { color: var(--yellow); }

.nav-links a.order-btn,
.nav-links a.history-btn {
	background: var(--yellow);
	color: var(--green);
	padding: 8px 18px;
	border-radius: 6px;
	font-family: 'Oswald', sans-serif;
	font-weight: 700;
	font-size: 13px;
	letter-spacing: 1px;
	text-decoration: none;
	transition: background 0.3s, color 0.3s, transform 0.2s;
	cursor: pointer;
}

.nav-links a.order-btn:hover,
.nav-links a.history-btn:hover {
	background: var(--green);
	color: var(--light);
	transform: translateY(-2px);
}

/* ── CONTAINER ── */
.container {
	max-width: 1060px;
	margin: 40px auto;
	padding: 0 20px 60px;
}

.page-title {
	font-family: 'Oswald', sans-serif;
	font-size: 2.4rem;
	font-weight: 700;
	text-transform: uppercase;
	color: var(--green);
	text-align: center;
	margin-bottom: 6px;
	animation: fadeUp 0.6s 0.2s ease both;
}

.page-sub {
	text-align: center;
	color: #888;
	font-size: 14px;
	margin-bottom: 36px;
	animation: fadeUp 0.6s 0.3s ease both;
}

@keyframes fadeUp {
	from { transform: translateY(24px); opacity: 0; }
	to   { transform: translateY(0);    opacity: 1; }
}

/* ── MENU GRID ── */
.menu {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
	gap: 22px;
	margin-bottom: 36px;
}

/* ── CARD ── */
.card {
	background: var(--light);
	border-radius: 16px;
	padding: 20px;
	box-shadow: var(--shadow);
	position: relative;
	overflow: hidden;
	transition: transform 0.35s cubic-bezier(.22,1,.36,1), box-shadow 0.35s;
	animation: cardIn 0.6s ease both;
}

.card::before {
	content: '';
	position: absolute;
	top: 0; left: 0; right: 0;
	height: 4px;
	background: linear-gradient(90deg, var(--green), var(--yellow));
	transform: scaleX(0);
	transform-origin: left;
	transition: transform 0.4s ease;
}

.card:hover::before { transform: scaleX(1); }
.card:hover {
	transform: translateY(-6px);
	box-shadow: 0 20px 50px rgba(0,0,0,0.12);
}

/* Stagger cards */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }

@keyframes cardIn {
	from { transform: translateY(40px); opacity: 0; }
	to   { transform: translateY(0);    opacity: 1; }
}

.card-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 14px;
}

.card h3 {
	font-family: 'Oswald', sans-serif;
	font-size: 1.15rem;
	font-weight: 700;
	color: var(--dark);
}

.price-tag {
	background: var(--yellow);
	color: var(--dark);
	font-family: 'Oswald', sans-serif;
	font-weight: 700;
	font-size: 13px;
	padding: 4px 10px;
	border-radius: 100px;
}

/* OPTIONS */
.options {
	display: flex;
	flex-direction: column;
	gap: 7px;
	margin-bottom: 16px;
}

.options label {
	display: flex;
	align-items: center;
	gap: 9px;
	font-size: 13px;
	color: #555;
	cursor: pointer;
	padding: 5px 8px;
	border-radius: 8px;
	transition: background 0.2s, color 0.2s;
}

.options label:hover { background: var(--gray); color: var(--dark); }

.options input[type="checkbox"] {
	accent-color: var(--green);
	width: 15px; height: 15px;
	cursor: pointer;
}

/* ADD BUTTON */
.card button {
	width: 100%;
	padding: 11px;
	background: var(--green);
	color: var(--light);
	border: none;
	border-radius: 10px;
	font-family: 'Oswald', sans-serif;
	font-size: 14px;
	font-weight: 600;
	letter-spacing: 1px;
	cursor: pointer;
	position: relative;
	overflow: hidden;
	transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
	box-shadow: 0 4px 0 #005c1e;
}

.card button::after {
	content: '';
	position: absolute;
	inset: 0;
	background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
	transform: scale(0);
	opacity: 0;
	transition: transform 0.4s, opacity 0.4s;
}

.card button:hover {
	background: var(--dark);
	transform: translateY(-2px);
	box-shadow: 0 6px 0 #000;
}

.card button:active::after {
	transform: scale(3);
	opacity: 1;
	transition: 0s;
}

.card button:active {
	transform: translateY(2px);
	box-shadow: 0 1px 0 #005c1e;
}

/* ── CART ── */
.cart {
	background: var(--light);
	border-radius: 16px;
	padding: 24px;
	box-shadow: var(--shadow);
	border-left: 5px solid var(--green);
	animation: fadeUp 0.6s 0.5s ease both;
}

.cart h3 {
	font-family: 'Oswald', sans-serif;
	font-size: 1.3rem;
	color: var(--green);
	margin-bottom: 14px;
	letter-spacing: 1px;
}

#cart-list {
	list-style: none;
	display: flex;
	flex-direction: column;
	gap: 8px;
	min-height: 30px;
}

#cart-list li {
	display: flex;
	justify-content: space-between;
	align-items: center;
	background: var(--gray);
	padding: 10px 14px;
	border-radius: 10px;
	font-size: 14px;
	animation: slideIn 0.3s ease both;
	transition: background 0.2s;
}

#cart-list li:hover { background: #e8e8e8; }

@keyframes slideIn {
	from { transform: translateX(-20px); opacity: 0; }
	to   { transform: translateX(0);     opacity: 1; }
}

#cart-list li button {
	background: #ff4444;
	color: white;
	border: none;
	border-radius: 6px;
	padding: 4px 10px;
	font-size: 12px;
	cursor: pointer;
	transition: background 0.2s, transform 0.2s;
	flex-shrink: 0;
	margin-left: 10px;
}

#cart-list li button:hover {
	background: #cc0000;
	transform: scale(1.1);
}

.cart-total {
	margin-top: 14px;
	font-size: 1.1rem;
	font-family: 'Oswald', sans-serif;
	color: var(--dark);
	padding-top: 14px;
	border-top: 2px dashed #ddd;
}

.cart-total span {
	color: var(--green);
	font-size: 1.4rem;
}

.checkout-btn {
	margin-top: 16px;
	width: 100%;
	padding: 15px;
	background: var(--yellow);
	color: var(--dark);
	border: none;
	border-radius: 10px;
	font-family: 'Oswald', sans-serif;
	font-size: 1.05rem;
	font-weight: 700;
	letter-spacing: 2px;
	cursor: pointer;
	box-shadow: 0 5px 0 #c9a800;
	transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
	text-transform: uppercase;
	position: relative;
	overflow: hidden;
}

.checkout-btn::before {
	content: '';
	position: absolute;
	top: 0; left: -100%;
	width: 60%;
	height: 100%;
	background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
	transition: left 0.5s ease;
}

.checkout-btn:hover::before { left: 150%; }

.checkout-btn:hover {
	background: var(--green);
	color: var(--light);
	transform: translateY(-3px);
	box-shadow: 0 8px 0 #005c1e;
}

.checkout-btn:active {
	transform: translateY(2px);
	box-shadow: 0 2px 0 #c9a800;
}

/* ── SIDE PANEL OVERLAY ── */
.panel-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0);
	pointer-events: none;
	transition: background 0.4s ease;
	z-index: 1999;
}

.panel-overlay.active {
	background: rgba(0,0,0,0.35);
	pointer-events: all;
}

/* ── SIDE PANEL ── */
.side-panel {
	position: fixed;
	top: 0; right: -380px;
	width: 360px;
	height: 100%;
	background: var(--dark);
	box-shadow: -8px 0 50px rgba(0,0,0,0.35);
	transition: right 0.45s cubic-bezier(.22,1,.36,1);
	z-index: 2000;
	display: flex;
	flex-direction: column;
	overflow: hidden;
}

.side-panel.active { right: 0; }

/* Top accent bar */
.side-panel::before {
	content: '';
	position: absolute;
	top: 0; left: 0; right: 0;
	height: 4px;
	background: linear-gradient(90deg, var(--green), var(--yellow), var(--green));
	background-size: 200% 100%;
	animation: gradientShift 3s linear infinite;
}

@keyframes gradientShift {
	0%   { background-position: 0% 0%; }
	100% { background-position: 200% 0%; }
}

/* Panel header */
.panel-header {
	padding: 28px 24px 20px;
	border-bottom: 1px solid rgba(255,255,255,0.07);
	display: flex;
	justify-content: space-between;
	align-items: center;
	flex-shrink: 0;
}

.panel-header h2 {
	font-family: 'Oswald', sans-serif;
	font-size: 1.3rem;
	font-weight: 700;
	letter-spacing: 2px;
	text-transform: uppercase;
	color: var(--light);
	display: flex;
	align-items: center;
	gap: 10px;
}

.panel-header h2::before {
	content: '🕐';
	font-size: 1.1rem;
}

.close-btn {
	width: 34px; height: 34px;
	display: flex; align-items: center; justify-content: center;
	font-size: 22px;
	cursor: pointer;
	color: #666;
	border: 1px solid #333;
	border-radius: 8px;
	background: rgba(255,255,255,0.04);
	transition: color 0.2s, background 0.2s, transform 0.25s, border-color 0.2s;
	line-height: 1;
}

.close-btn:hover {
	color: var(--light);
	background: rgba(255,255,255,0.1);
	border-color: #555;
	transform: rotate(90deg);
}

/* Scrollable order list area */
.panel-body {
	flex: 1;
	overflow-y: auto;
	padding: 16px 20px 24px;
	scrollbar-width: thin;
	scrollbar-color: #333 transparent;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

#orderList {
	list-style: none;
	display: flex;
	flex-direction: column;
	gap: 12px;
}

/* Empty state */
#orderList:empty::after {
	content: 'No past orders yet.';
	display: block;
	text-align: center;
	color: #555;
	font-size: 13px;
	padding: 40px 0;
	font-style: italic;
}

/* Order card */
#orderList li {
	background: rgba(255,255,255,0.05);
	border: 1px solid rgba(255,255,255,0.07);
	border-radius: 14px;
	padding: 16px 16px 14px;
	font-size: 13px;
	line-height: 1.6;
	color: #bbb;
	position: relative;
	overflow: hidden;
	animation: panelCardIn 0.35s ease both;
	transition: background 0.25s, border-color 0.25s, transform 0.25s;
}

#orderList li:hover {
	background: rgba(255,255,255,0.08);
	border-color: rgba(249,211,58,0.25);
	transform: translateX(-3px);
}

/* Left accent bar per card */
#orderList li::before {
	content: '';
	position: absolute;
	left: 0; top: 0; bottom: 0;
	width: 3px;
	background: linear-gradient(180deg, var(--green), var(--yellow));
	border-radius: 3px 0 0 3px;
}

@keyframes panelCardIn {
	from { transform: translateX(20px); opacity: 0; }
	to   { transform: translateX(0);    opacity: 1; }
}

/* Stagger delays */
#orderList li:nth-child(1) { animation-delay: 0.05s; }
#orderList li:nth-child(2) { animation-delay: 0.12s; }
#orderList li:nth-child(3) { animation-delay: 0.19s; }
#orderList li:nth-child(4) { animation-delay: 0.26s; }
#orderList li:nth-child(5) { animation-delay: 0.33s; }

.order-meta {
	font-family: 'Oswald', sans-serif;
	font-size: 11px;
	letter-spacing: 1px;
	text-transform: uppercase;
	color: #555;
	margin-bottom: 6px;
}

.order-items {
	color: #ddd;
	font-weight: 600;
	margin-bottom: 4px;
}

.order-total {
	color: var(--yellow);
	font-family: 'Oswald', sans-serif;
	font-size: 1rem;
	font-weight: 700;
}

.use-btn {
	margin-top: 12px;
	display: inline-flex;
	align-items: center;
	gap: 6px;
	padding: 7px 16px;
	background: transparent;
	color: var(--green);
	border: 1px solid var(--green);
	border-radius: 8px;
	cursor: pointer;
	font-family: 'Oswald', sans-serif;
	font-size: 12px;
	font-weight: 600;
	letter-spacing: 1px;
	text-transform: uppercase;
	transition: background 0.25s, color 0.25s, transform 0.2s, box-shadow 0.2s;
}

.use-btn::before { content: '↺'; font-size: 14px; }

.use-btn:hover {
	background: var(--green);
	color: var(--light);
	transform: translateY(-2px);
	box-shadow: 0 4px 12px rgba(0,138,45,0.4);
}
</style>
</head>

<body>

<nav>
	<a href="/" class="nav-logo">
		<span class="logo-cat">Cat</span><span class="logo-doner">DonEr</span>
	</a>
	<div class="nav-links">
		<a href="/" class="nav-link">Home</a>
		<a href="/order" class="order-btn">ORDER</a>
		<a class="history-btn" onclick="openHistory()">History</a>
	</div>
</nav>

<div class="panel-overlay" id="panelOverlay" onclick="closeHistory()"></div>
<div id="sidePanel" class="side-panel">
	<div class="panel-header">
		<h2>Order History</h2>
		<span class="close-btn" onclick="closeHistory()">×</span>
	</div>
	<div class="panel-body">
		<ul id="orderList"></ul>
	</div>
</div>

<div class="container">
	<h2 class="page-title">Build Your Order</h2>
	<p class="page-sub">Pick your base, choose your toppings, enjoy.</p>

	<div class="menu">

		<div class="card">
			<div class="card-header">
				<h3>Chicken Doner</h3>
				<span class="price-tag">$5</span>
			</div>
			<div class="options">
				<label><input type="checkbox" value="Chicken"> 🍗 Chicken</label>
				<label><input type="checkbox" value="Tomato"> 🍅 Tomato</label>
				<label><input type="checkbox" value="Cucumber"> 🥒 Cucumber</label>
				<label><input type="checkbox" value="Onion"> 🧅 Onion</label>
				<label><input type="checkbox" value="Sauce"> 🥫 Sauce</label>
			</div>
			<button onclick="addCustom(this, 'Chicken Doner', 5)">+ Add to Order</button>
		</div>

		<div class="card">
			<div class="card-header">
				<h3>Beef Doner</h3>
				<span class="price-tag">$6</span>
			</div>
			<div class="options">
				<label><input type="checkbox" value="Beef"> 🥩 Beef</label>
				<label><input type="checkbox" value="Tomato"> 🍅 Tomato</label>
				<label><input type="checkbox" value="Cucumber"> 🥒 Cucumber</label>
				<label><input type="checkbox" value="Onion"> 🧅 Onion</label>
				<label><input type="checkbox" value="Sauce"> 🥫 Sauce</label>
			</div>
			<button onclick="addCustom(this, 'Beef Doner', 6)">+ Add to Order</button>
		</div>

		<div class="card">
			<div class="card-header">
				<h3>Chicken Saurma</h3>
				<span class="price-tag">$6</span>
			</div>
			<div class="options">
				<label><input type="checkbox" value="Chicken"> 🍗 Chicken</label>
				<label><input type="checkbox" value="Tomato"> 🍅 Tomato</label>
				<label><input type="checkbox" value="Cucumber"> 🥒 Cucumber</label>
				<label><input type="checkbox" value="Onion"> 🧅 Onion</label>
				<label><input type="checkbox" value="Sauce"> 🥫 Sauce</label>
			</div>
			<button onclick="addCustom(this, 'Chicken Saurma', 6)">+ Add to Order</button>
		</div>

		<div class="card">
			<div class="card-header">
				<h3>Beef Saurma</h3>
				<span class="price-tag">$7</span>
			</div>
			<div class="options">
				<label><input type="checkbox" value="Beef"> 🥩 Beef</label>
				<label><input type="checkbox" value="Tomato"> 🍅 Tomato</label>
				<label><input type="checkbox" value="Cucumber"> 🥒 Cucumber</label>
				<label><input type="checkbox" value="Onion"> 🧅 Onion</label>
				<label><input type="checkbox" value="Sauce"> 🥫 Sauce</label>
			</div>
			<button onclick="addCustom(this, 'Beef Saurma', 7)">+ Add to Order</button>
		</div>

	</div>

	<!-- CART -->
	<div class="cart">
		<h3>🛒 Your Order</h3>
		<ul id="cart-list"></ul>
		<p class="cart-total">Total: <span>$<span id="total">0</span></span></p>
		<button class="checkout-btn" onclick="checkout()">✔ Confirm Order</button>
	</div>
</div>

<script>
let total = 0;

function addCustom(button, name, price) {
	let card = button.parentElement;
	let checks = card.querySelectorAll("input:checked");
	let extras = [];
	checks.forEach(c => extras.push(c.value));

	let finalText = name;
	if (extras.length > 0) finalText += " (" + extras.join(", ") + ")";

	const list = document.getElementById("cart-list");
	const item = document.createElement("li");
	item.textContent = finalText + " — $" + price;

	let delBtn = document.createElement("button");
	delBtn.textContent = "Remove";
	delBtn.onclick = function () {
		item.style.animation = "slideOut 0.25s ease forwards";
		setTimeout(() => { list.removeChild(item); total -= price; document.getElementById("total").textContent = total; }, 240);
	};

	item.appendChild(delBtn);
	list.appendChild(item);
	total += price;
	document.getElementById("total").textContent = total;
}

function checkout() {
	if (total === 0) { alert("Cart is empty!"); return; }
	let items = [];
	document.querySelectorAll("#cart-list li").forEach(li => items.push(li.childNodes[0].textContent));
	localStorage.setItem("orderData", JSON.stringify({ items, total }));
	window.location.href = "/orderpage";
}

function useOrder(order) {
	localStorage.setItem("orderData", JSON.stringify({ name: order[0], phone: order[1], email: order[2], address: order[3], items: order[4], total: order[5] }));
	window.location.href = "/orderpage";
}

function loadOrders() {
	fetch("/get-orders").then(res => res.json()).then(data => {
		let list = document.getElementById("orderList");
		list.innerHTML = "";

		if (!data || data.length === 0) {
			list.innerHTML = `
				<li style="background:transparent;border:1px dashed #333;text-align:center;padding:30px 16px;color:#555;animation:panelCardIn 0.4s ease both;">
					<div style="font-size:2rem;margin-bottom:10px;">🍽️</div>
					<div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#555;">No past orders yet</div>
					<div style="font-size:12px;color:#444;margin-top:6px;">Place your first order!</div>
				</li>`;
			return;
		}

		data.forEach((order, i) => {
			let li = document.createElement("li");
			li.style.animationDelay = (i * 0.07) + "s";
			li.innerHTML = `
				<div class="order-meta">Order #${i + 1}</div>
				<div class="order-items">${order[4]}</div>
				<div class="order-total">$${order[5]}</div>
				<button class="use-btn">Re-use Order</button>`;
			li.querySelector("button").addEventListener("click", () => useOrder(order));
			list.appendChild(li);
		});
	}).catch(() => {
		document.getElementById("orderList").innerHTML = `
			<li style="background:transparent;border:1px dashed #333;text-align:center;padding:30px 16px;color:#555;animation:panelCardIn 0.4s ease both;">
				<div style="font-size:2rem;margin-bottom:10px;">⚠️</div>
				<div style="font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;color:#555;text-transform:uppercase;">Could not load orders</div>
			</li>`;
	});
}

function openHistory() {
	document.getElementById("sidePanel").classList.add("active");
	document.getElementById("panelOverlay").classList.add("active");
	loadOrders();
}

function closeHistory() {
	document.getElementById("sidePanel").classList.remove("active");
	document.getElementById("panelOverlay").classList.remove("active");
}
</script>
