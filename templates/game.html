<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkey Doner Runner</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Arial Black',sans-serif;
    user-select:none;
  }
  h1 { color:#ff6600; font-size:1.8rem; margin-bottom:8px; text-shadow:2px 2px 0 #000; }
  #wrap { position:relative; }
  canvas { display:block; border:3px solid #ff6600; border-radius:10px; box-shadow:0 0 30px #ff6600aa; }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.82); border-radius:10px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
  }
  #overlay h2 { color:#ff6600; font-size:2.4rem; text-shadow:2px 2px 0 #000; text-align:center; }
  #overlay .sub { color:#ffcc00; font-size:1rem; text-align:center; line-height:1.6; }
  #overlay .score-big { color:#fff; font-size:1.8rem; }
  #overlay .score-big span { color:#ffcc00; font-size:2.6rem; }
  #overlay button {
    padding:12px 40px; font-size:1.2rem; font-weight:900;
    background:#ff6600; color:#fff; border:none; border-radius:8px;
    cursor:pointer; box-shadow:0 4px 0 #aa3300; margin-top:4px;
    font-family:'Arial Black',sans-serif;
  }
  #overlay button:hover { background:#ff8800; }
  #controls { color:#555; margin-top:8px; font-size:0.82rem; }

  /* SHOP OVERLAY */
  #shopOverlay {
    display:none; position:absolute; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.93); border-radius:10px;
    flex-direction:column; align-items:center; justify-content:flex-start;
    overflow-y:auto; padding:18px 14px; gap:10px;
  }
  #shopOverlay h2 { color:#ff6600; font-size:1.6rem; text-shadow:2px 2px 0#000; text-align:center; margin-bottom:2px; }
  .shop-pts { color:#ffcc00; font-size:1rem; margin-bottom:6px; }
  .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
  .menu-card {
    background:#1a0800; border:2px solid #444; border-radius:10px;
    padding:10px; cursor:pointer; transition:all 0.15s; text-align:center;
    position:relative;
  }
  .menu-card:hover { border-color:#ff6600; }
  .menu-card.selected { border-color:#ffcc00; background:#2a1200; box-shadow:0 0 14px #ffcc0066; }
  .menu-card .emoji { font-size:2rem; display:block; }
  .menu-card .name { color:#fff; font-size:0.85rem; font-weight:900; margin:4px 0 2px; }
  .menu-card .cost { color:#ffcc00; font-size:0.8rem; }
  .menu-card .badge {
    position:absolute; top:5px; right:6px;
    background:#ff6600; color:#fff; font-size:0.65rem;
    padding:2px 6px; border-radius:8px; display:none;
  }
  .menu-card.selected .badge { display:block; }
  .qty-ctrl { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:4px; }
  .qty-ctrl button {
    width:24px; height:24px; border-radius:50%; border:none;
    background:#ff6600; color:#fff; font-size:1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0;
    box-shadow:none; margin:0; font-family:Arial;
  }
  .qty-ctrl span { color:#fff; font-weight:900; min-width:18px; text-align:center; }
  .shop-footer { width:100%; background:#1a0800; border:2px solid #ff6600; border-radius:10px; padding:10px 14px; }
  .basket-title { color:#ff6600; font-size:0.85rem; font-weight:900; margin-bottom:6px; }
  .basket-item { color:#fff; font-size:0.8rem; display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px solid #333; }
  .basket-item:last-child { border-bottom:none; }
  .shop-total { display:flex; justify-content:space-between; color:#ffcc00; font-weight:900; margin-top:6px; font-size:0.9rem; }
  .pts-bar { height:10px; background:#2a0a00; border-radius:5px; margin:6px 0; overflow:hidden; }
  .pts-bar-fill { height:100%; background:linear-gradient(90deg,#ff4400,#ffcc00); border-radius:5px; transition:width 0.3s; }
  .shop-btns { display:flex; gap:10px; margin-top:8px; }
  .shop-btns button { flex:1; padding:10px; font-size:0.95rem; font-family:'Arial Black',sans-serif; border:none; border-radius:8px; cursor:pointer; font-weight:900; }
  .btn-order { background:#ff6600; color:#fff; box-shadow:0 3px 0 #aa3300; }
  .btn-order:hover { background:#ff8800; }
  .btn-order:disabled { background:#555; box-shadow:none; cursor:not-allowed; }
  .btn-again { background:#333; color:#aaa; }
  .btn-again:hover { background:#444; color:#fff; }
  .unlock-tag { font-size:0.62rem; color:#ff8844; }
  .back-btn {display: block;width: fit-content;margin: 0 auto;padding: 10px 26px;background: transparent;color: #999;border: 2px solid #ddd;border-radius: 10px;font-family: 'Nunito', sans-serif;font-size: 13px;font-weight: 700;cursor: pointer;transition: border-color 0.3s, color 0.3s, transform 0.2s;animation: boxIn 0.5s 0.5s ease both;text-transform: uppercase;letter-spacing: 1px; position: relative; top: 80px;}
  .back-btn:hover {border-color: var(white);color: var(white);transform: translateY(-2px);}
</style>
</head>
<body>
<h1>🫏 DONKEY DONER RUNNER 🌯</h1>
<div id="wrap">
  <canvas id="c" width="850" height="300"></canvas>

  <!-- SHOP OVERLAY -->
  <div id="shopOverlay">
    <h2>🎉 YOU WIN! CLAIM YOUR REWARDS</h2>
    <div class="shop-pts">You have <span id="shopPtsLeft" style="color:#ff6600;font-size:1.2rem;font-weight:900">1000</span> pts to spend</div>
    <div class="pts-bar" style="width:100%;max-width:500px"><div class="pts-bar-fill" id="ptsBarFill" style="width:100%"></div></div>
    <div class="menu-grid" id="menuGrid"></div>
    <div class="shop-footer">
      <div class="basket-title">🛒 Your Basket</div>
      <div id="basketItems"><div style="color:#555;font-size:0.8rem">Nothing selected yet</div></div>
      <div class="shop-total"><span>Total</span><span id="shopTotal">0 pts</span></div>
    </div>
    <div class="shop-btns">
      <button class="btn-again" onclick="skipShop()">↩ Play Again</button>
      <button class="btn-order" id="orderBtn" onclick="goOrder()">Order Now 🌯</button>
    </div>
  </div>

  <div id="overlay">
    <h2>DONKEY DONER<br>RUNNER</h2>
    <div class="sub">🌯 Collect donairs to earn points<br>🚫 Jump over obstacles<br>Reach <b style="color:#ff6600">1000 pts</b> to win!</div>
    <button id="startBtn">PLAY! 🫏</button>
  </div>
</div>
<div id="controls">SPACE / ↑ — Jump &nbsp;|&nbsp; SHIFT — Duck</div>

<button class="back-btn" onclick="window.location.href='/home'">← Back to Menu</button>

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const overlay= document.getElementById('overlay');
const W = canvas.width, H = canvas.height;

// Ground Y is where feet rest
const GROUND_Y = H - 55;
const WIN_SCORE = 1000;

const playerImg = new Image(); playerImg.src = PLAYER_SRC;
const donerImg  = new Image(); donerImg.src  = DONER_SRC;

let G, animFrame, lastTs = 0;

/* ──────────────────────────────────
   INIT
────────────────────────────────── */
function initGame() {
  return {
    state: 'playing',
    score: 0,
    speed: 5,
    tick: 0,
    player: {
      x: 90,
      // y = top of sprite; feet = y + h
      y: GROUND_Y - 68,
      w: 56, h: 68,
      vy: 0,
      onGround: true,
      ducking: false,
    },
    obstacles: [],
    doners: [],
    particles: [],
    groundX: 0,        // scrolling ground offset
    clouds: makeClouds(),
    obsCooldown: 0,
    donCooldown: 0,
    shakeT: 0,
    dead: false,
  };
}

function makeClouds() {
  return Array.from({length:5}, (_,i)=>({
    x: i * 200, y: 30 + Math.random()*60,
    w: 90 + Math.random()*70, spd: 0.4 + Math.random()*0.4
  }));
}

/* ──────────────────────────────────
   INPUT
────────────────────────────────── */
const keys = {};
document.addEventListener('keydown', e => {
  if (['Space','ArrowUp','ShiftLeft','ShiftRight'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp') doJump();
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') startDuck();
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') endDuck();
});
canvas.addEventListener('pointerdown', e => {
  const rel = e.clientY - canvas.getBoundingClientRect().top;
  if (rel > H * 0.6) startDuck(); else doJump();
});
canvas.addEventListener('pointerup', endDuck);

function doJump() {
  if (!G || G.state !== 'playing' || G.dead) return;
  const p = G.player;
  if (p.onGround) {
    p.vy = -14.5;
    p.onGround = false;
    p.ducking = false;
  }
}
function startDuck() {
  if (!G || G.dead) return;
  if (G.player.onGround) G.player.ducking = true;
}
function endDuck() {
  if (G) G.player.ducking = false;
}

/* ──────────────────────────────────
   OBSTACLE HELPERS
────────────────────────────────── */
function spawnObs() {
  // Each obstacle is an array of world rects: {x(rel), yFromGround, w, h}
  // yFromGround = distance UP from GROUND_Y  (positive = above ground)
  const types = [
    // short wide cactus
    [ {rx:0,  rise:32, w:40, h:32} ],
    // tall single
    [ {rx:4,  rise:65, w:28, h:65} ],
    // two stumps
    [ {rx:0,  rise:36, w:24, h:36}, {rx:32, rise:48, w:24, h:48} ],
    // triple
    [ {rx:0,  rise:40, w:20, h:40}, {rx:22, rise:60, w:20, h:60}, {rx:44, rise:40, w:20, h:40} ],
    // flying low bar (duck under)
    [ {rx:0,  rise:85, w:70, h:18} ],  // high → player must duck? Actually jump
  ];
  const pick = types[Math.floor(Math.random()*types.length)];
  return { x: W + 10, rects: pick };
}

/* Obstacle world rects (absolute) */
function obsRects(o) {
  return o.rects.map(r => ({
    x: o.x + r.rx,
    y: GROUND_Y - r.rise,
    w: r.w,
    h: r.h,
  }));
}

function spawnDoner(speed) {
  const high = Math.random() > 0.45;
  const y = high ? GROUND_Y - 120 : GROUND_Y - 50;
  return { x: W + 10, y, w: 38, h: 38, speed, collected: false };
}

/* ──────────────────────────────────
   COLLISION (AABB)
────────────────────────────────── */
function overlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

/* Player hitbox — shrunken for fairness */
function playerBox() {
  const p = G.player;
  const ph = p.ducking ? 38 : p.h;
  const py = p.ducking ? GROUND_Y - ph : p.y;
  // shrink horizontally 10px each side, vertically 8px top
  return { x: p.x + 10, y: py + 8, w: p.w - 20, h: ph - 8 };
}

/* ──────────────────────────────────
   UPDATE
────────────────────────────────── */
const GRAVITY = 0.7;

function update() {
  if (!G || G.state !== 'playing') return;
  G.tick++;
  const p = G.player;

  // speed ramp (distance based, caps at 13)
  G.speed = Math.min(5 + G.tick * 0.002, 13);

  /* --- Player physics --- */
  if (!p.onGround) {
    p.vy += GRAVITY;
    p.y  += p.vy;
    // landed?
    const standGroundY = GROUND_Y - p.h;
    if (p.y >= standGroundY) {
      p.y = standGroundY;
      p.vy = 0;
      p.onGround = true;
    }
  }

  /* --- Ground scroll --- */
  G.groundX -= G.speed;

  /* --- Clouds --- */
  G.clouds.forEach(c => {
    c.x -= c.spd;
    if (c.x + c.w < 0) { c.x = W + 20; c.y = 30 + Math.random()*60; c.w = 90+Math.random()*70; }
  });

  /* --- Spawn obstacles --- */
  G.obsCooldown--;
  if (G.obsCooldown <= 0) {
    G.obstacles.push(spawnObs());
    G.obsCooldown = Math.floor(80 - G.tick * 0.01 + Math.random()*40);
    if (G.obsCooldown < 45) G.obsCooldown = 45;
  }

  /* --- Spawn doners --- */
  G.donCooldown--;
  if (G.donCooldown <= 0) {
    G.doners.push(spawnDoner(G.speed * 0.85));
    G.donCooldown = Math.floor(55 + Math.random()*35);
  }

  /* --- Move & collide obstacles --- */
  const pb = playerBox();
  G.obstacles = G.obstacles.filter(o => o.x > -120);
  for (const o of G.obstacles) {
    o.x -= G.speed;
    if (G.dead) continue;
    for (const r of obsRects(o)) {
      if (overlap(pb, r)) {
        G.dead = true;
        G.shakeT = 20;
        setTimeout(() => endGame(), 700);
        break;
      }
    }
  }

  /* --- Move & collect doners --- */
  G.doners = G.doners.filter(d => d.x > -60);
  for (const d of G.doners) {
    d.x -= d.speed;
    if (!d.collected) {
      const dr = {x:d.x, y:d.y, w:d.w, h:d.h};
      if (overlap(pb, dr)) {
        d.collected = true;
        G.score += 20;
        if (G.score >= WIN_SCORE) { G.score = WIN_SCORE; winGame(); return; }
        for (let i=0;i<12;i++) G.particles.push({
          x:d.x+d.w/2, y:d.y+d.h/2,
          vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-1,
          life:40, color:`hsl(${15+Math.random()*35},100%,60%)`
        });
      }
    }
  }

  /* --- Particles --- */
  G.particles = G.particles.filter(p=>p.life>0);
  G.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;});

  if (G.shakeT > 0) G.shakeT--;
}

/* ──────────────────────────────────
   DRAW
────────────────────────────────── */
function draw() {
  ctx.save();
  if (G.shakeT > 0) {
    ctx.translate((Math.random()-0.5)*8, (Math.random()-0.5)*5);
  }

  // Sky
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0c0400'); sky.addColorStop(0.7,'#220a00'); sky.addColorStop(1,'#3d1200');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Clouds
  G.clouds.forEach(c => {
    ctx.fillStyle='rgba(255,120,30,0.07)';
    ctx.beginPath(); ctx.ellipse(c.x+c.w/2,c.y,c.w/2,16,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.3,c.y-10,c.w*0.22,12,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.72,c.y-7,c.w*0.2,11,0,0,Math.PI*2); ctx.fill();
  });

  // Ground
  const goff = ((G.groundX % 24) + 24) % 24;
  // fill
  const gf = ctx.createLinearGradient(0,GROUND_Y,0,H);
  gf.addColorStop(0,'#5c2800'); gf.addColorStop(1,'#1a0800');
  ctx.fillStyle=gf; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  // top line
  ctx.strokeStyle='#ff6600'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(W,GROUND_Y); ctx.stroke();
  // dashes
  ctx.strokeStyle='rgba(255,100,0,0.25)'; ctx.lineWidth=1.5;
  ctx.setLineDash([14,10]);
  ctx.beginPath(); ctx.moveTo(-goff+4, GROUND_Y+12); ctx.lineTo(W+24, GROUND_Y+12); ctx.stroke();
  ctx.setLineDash([]);

  // Obstacles
  G.obstacles.forEach(o => {
    obsRects(o).forEach(r => {
      // shadow
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.fillRect(r.x+4, r.y+4, r.w, r.h);
      // body
      const grad = ctx.createLinearGradient(r.x,r.y,r.x+r.w,r.y);
      grad.addColorStop(0,'#7a3000'); grad.addColorStop(1,'#a04010');
      ctx.fillStyle=grad; ctx.fillRect(r.x,r.y,r.w,r.h);
      // top accent
      ctx.fillStyle='#ff5500'; ctx.fillRect(r.x,r.y,r.w,4);
      // center spit (döner rod)
      ctx.fillStyle='#cc3300';
      ctx.fillRect(r.x+r.w/2-2,r.y,4,r.h);
      // outline
      ctx.strokeStyle='#ff6600'; ctx.lineWidth=1;
      ctx.strokeRect(r.x,r.y,r.w,r.h);
    });
  });

  // Doners
  const t = Date.now();
  G.doners.forEach(d => {
    if (!d.collected) {
      const bob = Math.sin(t/380 + d.x*0.04)*5;
      ctx.save();
      ctx.shadowColor='#ffcc00'; ctx.shadowBlur=16+6*Math.sin(t/280);
      ctx.drawImage(donerImg, d.x, d.y+bob, d.w, d.h);
      ctx.restore();
    }
  });

  // Particles
  G.particles.forEach(pt => {
    ctx.save(); ctx.globalAlpha=pt.life/40;
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Player
  const p = G.player;
  const duckH = 42, duckW = 70;
  const drawH = p.ducking ? duckH : p.h;
  const drawW = p.ducking ? duckW : p.w;
  const drawY = p.ducking ? GROUND_Y - duckH : p.y;
  const drawX = p.ducking ? p.x - 8 : p.x;

  ctx.save();
  if (G.dead) { ctx.globalAlpha=0.45+0.45*Math.sin(t/70); ctx.filter='grayscale(1)'; }
  ctx.drawImage(playerImg, drawX, drawY, drawW, drawH);
  ctx.restore();

  // DEBUG hitbox — uncomment to tune:
  // const pb = playerBox(); ctx.strokeStyle='lime';ctx.lineWidth=1;ctx.strokeRect(pb.x,pb.y,pb.w,pb.h);

  // HUD bar
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,40);

  // Score
  ctx.font='bold 20px Arial Black'; ctx.fillStyle='#ffcc00';
  ctx.fillText('Score: ' + G.score, 12, 26);

  // Progress bar
  const bx=200, bw=440, by=12, bh=16;
  ctx.fillStyle='#2a0a00'; ctx.fillRect(bx,by,bw,bh);
  const pct = G.score/WIN_SCORE;
  const bar = ctx.createLinearGradient(bx,0,bx+bw,0);
  bar.addColorStop(0,'#ff4400'); bar.addColorStop(1,'#ffcc00');
  ctx.fillStyle=bar; ctx.fillRect(bx,by,bw*pct,bh);
  ctx.strokeStyle='#ff6600'; ctx.lineWidth=1.5; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
  ctx.fillText(G.score + ' / ' + WIN_SCORE, bx+bw/2, by+12);
  ctx.textAlign='left';

  // Speed
  ctx.font='12px Arial'; ctx.fillStyle='#ff8844';
  ctx.fillText('Speed x'+G.speed.toFixed(1), W-110, 26);

  ctx.restore(); // shake
}

/* ──────────────────────────────────
   GAME LOOP
────────────────────────────────── */
function loop(ts) {
  update();
  draw();
  animFrame = requestAnimationFrame(loop);
}

/* ──────────────────────────────────
   END / WIN
────────────────────────────────── */
function endGame() {
  if (!G || G.state !== 'playing') return;
  G.state = 'gameover';
  cancelAnimationFrame(animFrame);
  draw();
  overlay.innerHTML = `
    <h2>💥 GAME OVER!</h2>
    <div class="sub">You hit an obstacle!</div>
    <div class="score-big">Score: <span>${G.score}</span></div>
    <button id="startBtn">PLAY AGAIN 🫏</button>`;
  overlay.style.display='flex';
  document.getElementById('startBtn').onclick=startGame;
}

/* ── MENU DATA ── */
const MENU = [
  { id:'cd', name:'Chicken Doner',  emoji:'🌯', pts:200, unlock:200  },
  { id:'bd', name:'Beef Doner',     emoji:'🥙', pts:300, unlock:400  },
  { id:'cs', name:'Chicken Sourma', emoji:'🌮', pts:250, unlock:600  },
  { id:'bs', name:'Beef Sourma',    emoji:'🫔', pts:400, unlock:1000 },
];

let shopCart = {}; // id -> qty
let shopBudget = 1000;

function winGame() {
  G.state = 'win';
  cancelAnimationFrame(animFrame);
  draw();
  openShop();
}

function openShop() {
  shopCart = {};
  shopBudget = 1000;
  renderShop();
  document.getElementById('shopOverlay').style.display = 'flex';
}

function renderShop() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  MENU.forEach(item => {
    const qty = shopCart[item.id] || 0;
    const card = document.createElement('div');
    card.className = 'menu-card' + (qty > 0 ? ' selected' : '');
    card.id = 'card-' + item.id;
    card.innerHTML = `
      <span class="badge">✓ ${qty}</span>
      <span class="emoji">${item.emoji}</span>
      <div class="name">${item.name}</div>
      <div class="cost">${item.pts} pts each</div>
      <div class="unlock-tag">Unlocked at ${item.unlock} pts</div>
      <div class="qty-ctrl">
        <button onclick="changeQty('${item.id}',-1)">−</button>
        <span>${qty}</span>
        <button onclick="changeQty('${item.id}',1)">+</button>
      </div>`;
    grid.appendChild(card);
  });
  updateShopUI();
}

function changeQty(id, delta) {
  const item = MENU.find(m => m.id === id);
  const cur = shopCart[id] || 0;
  const newQty = Math.max(0, cur + delta);
  // check budget
  const spent = calcSpent();
  if (delta > 0 && spent + item.pts > shopBudget) return; // not enough pts
  shopCart[id] = newQty;
  renderShop();
}

function calcSpent() {
  return MENU.reduce((sum, m) => sum + (shopCart[m.id] || 0) * m.pts, 0);
}

function updateShopUI() {
  const spent = calcSpent();
  const left  = shopBudget - spent;
  document.getElementById('shopPtsLeft').textContent = left;
  document.getElementById('ptsBarFill').style.width  = (left/shopBudget*100)+'%';
  document.getElementById('shopTotal').textContent   = spent + ' pts';

  // Basket
  const container = document.getElementById('basketItems');
  const items = MENU.filter(m => (shopCart[m.id]||0) > 0);
  if (items.length === 0) {
    container.innerHTML = '<div style="color:#555;font-size:0.8rem">Nothing selected yet</div>';
  } else {
    container.innerHTML = items.map(m =>
      `<div class="basket-item"><span>${m.emoji} ${m.name} x${shopCart[m.id]}</span><span>${shopCart[m.id]*m.pts} pts</span></div>`
    ).join('');
  }

  // Order button
  const btn = document.getElementById('orderBtn');
  btn.disabled = items.length === 0;
}

function skipShop() {
  document.getElementById('shopOverlay').style.display = 'none';
  startGame();
}

function goOrder() {
  const items = MENU.filter(m => (shopCart[m.id]||0) > 0).map(m => ({
    name: m.name, emoji: m.emoji, qty: shopCart[m.id], pts: shopCart[m.id]*m.pts
  }));
  const total = calcSpent();
  localStorage.setItem('donkeyOrder', JSON.stringify({ items, total, budget: shopBudget }));
  window.location.href = 'giftorderpage.html';
}

function startGame() {
  overlay.style.display='none';
  G = initGame();
  cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(loop);
}

document.getElementById('startBtn').onclick=startGame;
</script>
